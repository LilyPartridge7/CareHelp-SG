databases:
  # 1. PostgreSQL Database
  - name: carehelp-db
    plan: free
    region: singapore
    postgresMajorVersion: 15

services:

  # 2. Go Backend Web Service
  - type: web
    name: carehelp-api
    env: go
    plan: free
    region: singapore
    buildCommand: "cd backend && go build -o server ./cmd/server/main.go"
    startCommand: "cd backend && ./server"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: carehelp-db
          property: connectionString
      - key: DB_HOST
        fromDatabase:
          name: carehelp-db
          property: host
      - key: DB_USER
        fromDatabase:
          name: carehelp-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: carehelp-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: carehelp-db
          property: database
      - key: DB_PORT
        fromDatabase:
          name: carehelp-db
          property: port
      - key: JWT_SECRET
        generateValue: true

  # 3. React Static Frontend
  - type: static
    name: carehelp-frontend
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist"
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: carehelp-api
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
